<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>헤어스타일 AI 추천</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f7f5;color:#1a1a1a;min-height:100vh}
  .header{background:#fff;border-bottom:1px solid #e8e8e4;padding:16px 24px;display:flex;align-items:center;gap:10px}
  .header h1{font-size:17px;font-weight:600}
  .header span{font-size:13px;color:#888;background:#f0effe;color:#6b5ce7;padding:3px 10px;border-radius:12px}
  .container{max-width:900px;margin:0 auto;padding:24px 16px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:640px){.container{grid-template-columns:1fr}}
  .card{background:#fff;border-radius:16px;border:1px solid #e8e8e4;padding:20px}
  .section-label{font-size:11px;font-weight:600;color:#aaa;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px}
  .upload-zone{border:1.5px dashed #d0d0c8;border-radius:12px;padding:24px;text-align:center;cursor:pointer;background:#fafaf8;transition:background 0.2s;margin-bottom:16px}
  .upload-zone:hover{background:#f0effe}
  .upload-zone p{font-size:13px;color:#888;margin-top:6px}
  #previewImg{width:100%;border-radius:10px;max-height:160px;object-fit:cover;display:none;margin-bottom:4px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
  .chip{padding:7px 14px;border-radius:20px;border:1px solid #e0e0d8;font-size:13px;cursor:pointer;background:#fff;color:#666;transition:all 0.15s}
  .chip.on{background:#f0effe;border-color:#6b5ce7;color:#4b3db5;font-weight:500}
  textarea{width:100%;border:1px solid #e0e0d8;border-radius:10px;padding:10px 12px;font-size:13px;resize:none;background:#fafaf8}
  .btn{width:100%;padding:12px;background:#6b5ce7;color:#fff;border:none;border-radius:12px;font-size:15px;cursor:pointer;margin-top:12px}
  .btn:disabled{background:#b0a8f0;cursor:not-allowed}
  .result-empty{display:flex;align-items:center;justify-content:center;min-height:300px;color:#bbb;text-align:center}
  .face-tag{display:inline-block;font-size:12px;padding:4px 12px;border-radius:12px;background:#e6f7f0;color:#1a7a52;margin-bottom:12px}
  .face-tip{font-size:13px;color:#666;margin-bottom:16px;line-height:1.6}
  .rec-item{display:flex;gap:10px;margin-bottom:12px}
  .rec-num{min-width:24px;height:24px;border-radius:50%;background:#f0effe;color:#4b3db5;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center}
  .rec-name{font-size:14px;font-weight:600}
  .rec-reason{font-size:13px;color:#666}
  .caution-box{background:#fdf8e8;border-radius:10px;padding:12px;margin:12px 0;font-size:13px;color:#7a6010}
  .memo-box{background:#f0effe;border-radius:10px;padding:14px;margin-top:4px}
  .copy-btn{width:100%;padding:10px;background:#fff;border:1px solid #c4bcf5;border-radius:10px;color:#6b5ce7;cursor:pointer;font-weight:500}
  .spinner{width:28px;height:28px;border:2.5px solid #e0d8ff;border-top-color:#6b5ce7;border-radius:50%;animation:spin 0.8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .divider{border:none;border-top:1px solid #f0f0ec;margin:14px 0}
</style>
</head>
<body>

<div class="header">
  <h1>✂️ 헤어스타일 AI 추천</h1>
  <span>MVP Demo</span>
</div>

<div class="container">
  <div class="card">
    <p class="section-label">Step 1 — 사진 업로드 (선택)</p>
    <div class="upload-zone" onclick="document.getElementById('fi').click()">
      <div id="uploadContent"><div class="icon">📷</div><p>사진을 선택해주세요</p></div>
      <img id="previewImg"/>
    </div>
    <input type="file" id="fi" accept="image/*" style="display:none"/>

    <p class="section-label">Step 2 — 얼굴형</p>
    <div class="chips" id="faceChips">
      <span class="chip" onclick="selectFace(this)">계란형</span>
      <span class="chip" onclick="selectFace(this)">둥근형</span>
      <span class="chip" onclick="selectFace(this)">각진형</span>
      <span class="chip" onclick="selectFace(this)">긴형</span>
    </div>

    <p class="section-label">Step 3 — 원하는 스타일</p>
    <div class="chips" id="styleChips">
      <span class="chip" onclick="toggleStyle(this)">단발</span>
      <span class="chip" onclick="toggleStyle(this)">레이어드</span>
      <span class="chip" onclick="toggleStyle(this)">웨이브</span>
    </div>

    <p class="section-label">Step 4 — 라이프스타일</p>
    <div class="chips" id="lifeChips">
      <span class="chip" onclick="selectLife(this)">직장인</span>
      <span class="chip" onclick="selectLife(this)">학생</span>
    </div>

    <button class="btn" onclick="analyze()" id="analyzeBtn">✨ AI 추천 받기</button>
  </div>

  <div class="card" id="resultCard">
    <div class="result-empty" id="resultEmpty">결과가 여기에 표시됩니다 💇</div>
    <div id="resultContent"></div>
  </div>
</div>

<script>
let face = "";
let styles = [];
let life = "";

function selectFace(el){
  document.querySelectorAll('#faceChips .chip').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  face = el.textContent;
}

function selectLife(el){
  document.querySelectorAll('#lifeChips .chip').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  life = el.textContent;
}

function toggleStyle(el){
  el.classList.toggle('on');
  const val = el.textContent;
  if(el.classList.contains('on')) styles.push(val);
  else styles = styles.filter(s => s !== val);
}

async function analyze(){
  const btn = document.getElementById('analyzeBtn');
  const resultCard = document.getElementById('resultCard');
  
  btn.disabled = true;
  btn.textContent = "분석 중...";
  resultCard.innerHTML = '<div style="display:flex; justify-content:center; padding:50px;"><div class="spinner"></div></div>';

  try {
    const res = await fetch('/api/recommend', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ face, styles, life })
    });

    const d = await res.json();
    if(!res.ok) throw new Error(d.error || "추천 실패");

    renderResult(d);
  } catch(e) {
    resultCard.innerHTML = `<div class="result-empty">오류가 발생했습니다.<br><small>${e.message}</small></div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = "✨ AI 추천 받기";
  }
}

function renderResult(d){
  const items = (d.top_styles || []).map((s, i) => `
    <div class="rec-item">
      <span class="rec-num">${i+1}</span>
      <div>
        <div class="rec-name">${s.name}</div>
        <div class="rec-reason">${s.reason}</div>
      </div>
    </div>
  `).join('');

  document.getElementById('resultCard').innerHTML = `
    <p class="section-label">분석 결과</p>
    <span class="face-tag">${face || '분석 완료'}</span>
    <p class="face-tip">${d.face_tip || ''}</p>
    <hr class="divider"/>
    <p class="section-label">추천 스타일</p>
    ${items}
    <div class="caution-box">${d.caution || ''}</div>
    <div class="memo-box"><p id="mText">${d.memo || ''}</p></div>
    <button class="copy-btn" onclick="copyM()">📋 메모 복사</button>
  `;
}

function copyM(){
  const t = document.getElementById('mText').innerText;
  navigator.clipboard.writeText(t).then(() => alert('복사되었습니다!'));
}
</script>
</body>
</html>
